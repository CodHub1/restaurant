{% extends 'base.html' %}

{% block title %}{{ item.title }} — Старик и море{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <a href="{% url 'news_list' %}" class="btn btn-sm btn-outline-secondary mb-3">
                Ко всем новостям
            </a>
            <h1 class="mb-2">{{ item.title }}</h1>
            <p class="text-muted small mb-4">
                {{ item.published_at|date:"d.m.Y H:i" }}
            </p>
            {% if item.image %}
                <img src="{{ item.image.url }}" class="img-fluid rounded mb-4" alt="{{ item.title }}">
            {% endif %}
            <div class="news-content">{{ item.content|linebreaks }}</div>
        </div>
    </div>
</div>
{% endblock %}
